<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="選擇">
<title>選擇 · My Choices</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0e;
  --text: #e4e0d8;
  --muted: #5e5c58;
  --hint: #2e2e2c;
  --border: #242420;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif TC', serif;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

#app { width: 100%; height: 100dvh; position: relative; }

/* ── SPLASH ── */
#splash {
  position: absolute; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 200; padding: 2rem; cursor: pointer;
}
#splash.out { animation: splashOut 0.7s ease forwards; }
@keyframes splashOut { to { opacity: 0; pointer-events: none; } }

.brand-logo { opacity: 0; animation: fadeUp 1s ease 0.3s forwards; }
.brand-name {
  font-size: 12px; font-weight: 300; letter-spacing: 0.38em;
  color: var(--muted); text-transform: uppercase; margin-top: 1.5rem;
  opacity: 0; animation: fadeUp 1s ease 0.7s forwards;
}
.brand-slogan {
  font-family: 'DM Serif Display', serif; font-style: italic;
  font-size: clamp(13px, 3.5vw, 16px); color: #3a3835;
  margin-top: 0.5rem; letter-spacing: 0.04em;
  opacity: 0; animation: fadeUp 1s ease 1s forwards;
}
.splash-tap {
  position: absolute; bottom: 3rem;
  font-size: 10px; letter-spacing: 0.2em; color: #2a2a28;
  text-transform: uppercase;
  opacity: 0; animation: fadeUp 1s ease 1.6s forwards, blink 2.5s ease 2.6s infinite;
}
@keyframes blink { 0%,100%{opacity:0.35} 50%{opacity:0.7} }

/* ── LANG TOGGLE ── */
#lang-btn {
  position: absolute; top: 1.2rem; right: 1.2rem;
  background: transparent; border: 0.5px solid #2a2a28;
  color: #444; font-family: 'Noto Serif TC', serif;
  font-size: 11px; padding: 5px 12px; border-radius: 20px;
  cursor: pointer; letter-spacing: 0.08em; z-index: 50;
  transition: all 0.2s; display: none;
}
#lang-btn:hover { border-color: var(--muted); color: var(--text); }
#lang-btn.visible { display: block; }

/* ── COUNTER ── */
#counter {
  position: absolute; top: 1.2rem; left: 1.2rem;
  font-size: 11px; color: #333; letter-spacing: 0.1em;
  z-index: 50; font-family: 'DM Serif Display', serif;
  font-style: italic; display: none;
}
#counter.visible { display: block; }

/* ── NAMING ── */
#naming-screen {
  position: absolute; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100; padding: 0 0 1rem;
}
#naming-screen.hidden { display: none; }

.naming-eyebrow {
  font-size: 10px; letter-spacing: 0.26em; text-transform: uppercase;
  color: #2a2a28; font-family: 'DM Serif Display', serif; font-style: italic;
  margin-bottom: 1.5rem; padding-top: 4rem;
  opacity: 0; animation: fadeUp 0.7s ease 0.2s forwards;
}

.naming-q {
  font-size: 15px; color: #666; text-align: center;
  margin-bottom: 1.5rem; font-weight: 300; letter-spacing: 0.04em;
  padding: 0 1.5rem;
  opacity: 0; animation: fadeUp 0.7s ease 0.35s forwards;
}

.naming-cards {
  width: 100%; display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 12px; flex: 1; min-height: 0;
  opacity: 0; animation: fadeUp 0.7s ease 0.45s forwards;
}

/* reveal */
.reveal-wrap {
  display: flex; flex-direction: column;
  align-items: center; width: 100%; padding: 0 2rem;
}
.reveal-line {
  font-size: clamp(14px, 3.8vw, 18px); color: var(--muted);
  text-align: center; line-height: 2.4; font-weight: 300;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
.reveal-line.show { opacity: 1; transform: translateY(0); }
.reveal-name {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(40px, 12vw, 64px);
  color: var(--text); text-align: center; line-height: 1.15;
  margin: 0.5rem 0;
  opacity: 0; transform: translateY(14px);
  transition: opacity 1.1s ease, transform 1.1s ease;
}
.reveal-name.show { opacity: 1; transform: translateY(0); }
.reveal-actions {
  display: flex; gap: 10px; margin-top: 2.5rem;
  opacity: 0; transition: opacity 0.9s ease;
}
.reveal-actions.show { opacity: 1; }
.reveal-btn {
  background: transparent; border: 0.5px solid #2a2a28;
  color: var(--muted); font-family: 'Noto Serif TC', serif;
  font-size: 13px; padding: 11px 28px; border-radius: 40px;
  cursor: pointer; transition: all 0.2s; letter-spacing: 0.06em;
}
.reveal-btn:hover { border-color: var(--muted); color: var(--text); }
.reveal-btn.primary { border-color: #3a3835; color: var(--text); }

/* ── QUESTION SCREEN ── */
#question-screen {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
}
#question-screen.hidden { display: none; }

.top-bar {
  padding: 3rem 1.25rem 0.9rem;
  display: flex; flex-direction: column;
  align-items: center; gap: 0.45rem; flex-shrink: 0;
}

.q-eyebrow {
  font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase;
  color: #2a2a28; font-family: 'DM Serif Display', serif; font-style: italic;
}

.q-rule {
  width: 20px; height: 0.5px; background: #2e2c2a; flex-shrink: 0;
}

.q-text {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(22px, 6vw, 30px);
  font-weight: 400;
  color: #b8b4ac;
  text-align: center;
  line-height: 1.55;
  padding: 0 0.75rem;
  letter-spacing: 0.04em;
}

/* ── CARDS ── */
.cards-area {
  flex: 1; display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 0 12px; min-height: 0; align-items: stretch;
}

.card {
  border-radius: 22px;
  display: flex; flex-direction: column; justify-content: space-between;
  padding: 1.3rem 1.1rem 1.5rem;
  cursor: pointer; position: relative; overflow: hidden;
  border: 1px solid transparent;
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.28s ease;
  -webkit-tap-highlight-color: transparent;
  touch-action: none;
}

.card.chosen { transform: translateY(-10px); }
.card.unchosen { opacity: 0.13; transform: scale(0.98); }

.card-num {
  font-size: 10px; letter-spacing: 0.22em; opacity: 0.35;
  font-family: 'DM Serif Display', serif; font-style: italic;
  flex-shrink: 0; align-self: flex-start;
}

.card-symbol {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -56%);
  opacity: 0.18;
  width: 60%; height: 60%; pointer-events: none;
}
.card-symbol svg { width: 100%; height: 100%; }

.card-content {
  display: flex; flex-direction: column; gap: 0.4rem;
  align-self: flex-end; width: 100%;
}

.card-word {
  font-family: 'Noto Serif TC', serif; font-weight: 500;
  font-size: clamp(24px, 7vw, 42px);
  line-height: 1.2; letter-spacing: 0.02em;
}

.card-sub {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(11px, 2.5vw, 13px);
  opacity: 0.45; line-height: 1.6; font-weight: 300; letter-spacing: 0.04em;
}

/* ── PALETTES — dark + bright mix ── */
.c-night  { background:#0c0c0a; border-color:#282420; color:#dedad0; }
.c-chalk  { background:#f0ede4; border-color:#c4c0b4; color:#161410; }
.c-ink    { background:#08101e; border-color:#101e36; color:#8abce8; }
.c-sand   { background:#f0e2c4; border-color:#d4c09a; color:#201404; }
.c-void   { background:#0c0618; border-color:#1a0c2e; color:#b4acf0; }
.c-moss   { background:#0a1808; border-color:#162412; color:#8ec460; }
.c-ash    { background:#161614; border-color:#242220; color:#c8c4bc; }
.c-ember  { background:#1a0806; border-color:#300e0a; color:#f09060; }
.c-fog    { background:#10101c; border-color:#1c1c28; color:#a0a0c4; }
.c-dawn   { background:#1a1006; border-color:#2c1a08; color:#f0be68; }

/* bright cards */
.c-sun    { background:#fef0a0; border-color:#e0d060; color:#2a1e00; }
.c-rose   { background:#fde8f0; border-color:#e8b0c8; color:#3a0818; }
.c-sky    { background:#e0f0fe; border-color:#a0c8e8; color:#04184a; }
.c-mint   { background:#d8f8ec; border-color:#90d8b8; color:#043820; }
.c-peach  { background:#feeae0; border-color:#f0c0a0; color:#3a1008; }
.c-lilac  { background:#ede8fe; border-color:#c4b4f0; color:#180844; }
.c-cream  { background:#fdf6e8; border-color:#e0d4b0; color:#2a1e04; }
.c-coral  { background:#ff6b6b; border-color:#e04040; color:#fff0f0; }
.c-teal   { background:#0abfa3; border-color:#089080; color:#e0faf8; }
.c-gold   { background:#f5c518; border-color:#d4a800; color:#1a0e00; }

/* chosen accents */
.c-night.chosen{border-color:#404038} .c-chalk.chosen{border-color:#a0a090}
.c-ink.chosen{border-color:#1e3860} .c-sand.chosen{border-color:#b09060}
.c-void.chosen{border-color:#2a1858} .c-moss.chosen{border-color:#1e3e18}
.c-ash.chosen{border-color:#383834} .c-ember.chosen{border-color:#501810}
.c-fog.chosen{border-color:#282840} .c-dawn.chosen{border-color:#402010}
.c-sun.chosen{border-color:#c0a800} .c-rose.chosen{border-color:#e060a0}
.c-sky.chosen{border-color:#4080c0} .c-mint.chosen{border-color:#20a060}
.c-peach.chosen{border-color:#e08060} .c-lilac.chosen{border-color:#8060d0}
.c-coral.chosen{border-color:#c02020} .c-teal.chosen{border-color:#048060}
.c-gold.chosen{border-color:#a07800} .c-cream.chosen{border-color:#c0a840}

/* ── BOTTOM ── */
.bottom-area {
  padding: 0.8rem 1.5rem 2rem;
  display: flex; flex-direction: column;
  align-items: center; gap: 0.35rem; flex-shrink: 0;
}

.memory-strip {
  display: flex; gap: 5px; flex-wrap: wrap;
  justify-content: center; padding: 0 0.5rem; min-height: 20px;
}

.mem-chip {
  font-size: 10px; padding: 2px 9px; border-radius: 20px;
  background: #1a1a18; color: #484644; border: 0.5px solid #282624;
  animation: chipIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  letter-spacing: 0.04em; font-family: 'Noto Serif TC', serif;
}
@keyframes chipIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }

.skip-btn {
  background: transparent; border: none;
  color: #2e2c2a; font-family: 'Noto Serif TC', serif;
  font-size: 12px; cursor: pointer; padding: 8px 20px;
  letter-spacing: 0.06em; transition: color 0.2s;
}
.skip-btn:hover { color: var(--muted); }

.swipe-hint {
  font-size: 9px; color: #222220; letter-spacing: 0.14em;
  text-transform: uppercase; margin-top: 0.1rem;
}

/* ── TRANSITIONS ── */
.fade-in { animation: fadeUp 0.42s ease forwards; }
.fade-out { animation: fadeDown 0.26s ease forwards; }

@keyframes fadeUp   { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeDown { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-10px)} }

/* swipe feedback */
.card.swipe-left  { animation: swipeLeft  0.32s ease forwards; }
.card.swipe-right { animation: swipeRight 0.32s ease forwards; }
@keyframes swipeLeft  { to{transform:translateX(-120%) rotate(-8deg);opacity:0} }
@keyframes swipeRight { to{transform:translateX( 120%) rotate( 8deg);opacity:0} }
</style>
</head>
<body>
<div id="app">

<div id="splash" onclick="dismissSplash()">
  <div class="brand-logo">
    <svg width="44" height="54" viewBox="0 0 44 54" fill="none">
      <circle cx="22" cy="9" r="6" fill="#e4e0d8"/>
      <line x1="22" y1="15" x2="11" y2="38" stroke="#383634" stroke-width="1.2" stroke-linecap="round"/>

  </div>

</div>

<div id="counter"></div>
<button id="lang-btn" onclick="toggleLang()">EN</button>

<div id="naming-screen" class="hidden"></div>

<div id="question-screen" class="hidden">
  <div class="top-bar">
    <div class="q-eyebrow" id="q-eyebrow">選擇 問你</div>
    <div class="q-rule"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div class="cards-area" id="cards-area"></div>
  <div class="bottom-area">
    <div class="memory-strip" id="memory-strip"></div>
    <button class="skip-btn" id="skip-btn" onclick="skipQuestion()"></button>
    <div class="swipe-hint" id="swipe-hint">← 左滑或右滑，或直接點選 →</div>
  </div>
</div>

</div>

let LANG = localStorage.getItem('mc_lang') || 'zh';
function toggleLang() {
  LANG = LANG === 'zh' ? 'en' : 'zh';
  localStorage.setItem('mc_lang', LANG);
  document.getElementById('lang-btn').textContent = LANG === 'zh' ? 'EN' : '中';
  document.documentElement.lang = LANG === 'zh' ? 'zh-TW' : 'en';
  if (curQ) renderCards();

// ── STATE ──
let S = JSON.parse(localStorage.getItem('mc_v3') || 'null') || {
  phase:'naming', namingIdx:0, namingAns:[],
  name:'', answered:0, skipped:0,
  choices:[], chips:[], pool:[], poolIdx:0,
};
function save() { localStorage.setItem('mc_v3', JSON.stringify(S)); }
function rand(a) { return a[Math.floor(Math.random() * a.length)]; }

function getLabel() {
  const sets = S.answered < 30 ? LABELS_A : S.answered < 100 ? LABELS_B : LABELS_C;
  return rand(sets[LANG]);
}

function getSkip(type) {
  if (S.answered > 60 && Math.random() < 0.28) return rand(SKIP.late[LANG]);
  return rand(SKIP[type]?.[LANG] || SKIP.normal[LANG]);
}

function getName(ans) {
  const key = ans.join('');
  return NAMES[key] || rand(Object.values(NAMES));
}

function shufflePool() {
  S.pool = [...DQ].sort(() => Math.random() - 0.5);
  S.poolIdx = 0;
}

function addChip(txt) {
  S.chips.push(txt);
  if (S.chips.length > 6) S.chips.shift();
  renderChips();
}

function renderChips() {
  const el = document.getElementById('memory-strip');
  if (!el) return;
  el.innerHTML = '';
  S.chips.forEach(c => {
    const s = document.createElement('span');
    s.className = 'mem-chip'; s.textContent = c; el.appendChild(s);
  });
}

function updateCounter() {
  const el = document.getElementById('counter');
  if (!el) return;
  el.textContent = S.answered > 0 ? `${S.answered}` : '';
}

function updateTexts() {
  const ey = document.getElementById('q-eyebrow');
  const skip = document.getElementById('skip-btn');
  const hint = document.getElementById('swipe-hint');
  const lb = document.getElementById('lang-btn');
  if (ey) ey.textContent = getLabel();
  if (curQ && skip) skip.textContent = getSkip(curQ.t);
  if (hint) hint.textContent = LANG === 'zh' ? '← 左滑或右滑，或直接點選 →' : '← swipe or tap →';
  if (lb) lb.textContent = LANG === 'zh' ? 'EN' : '中';
  if (curQ) {
    const qt = document.getElementById('q-text');
    if (qt) qt.textContent = LANG === 'zh' ? curQ.zh : (curQ.en || curQ.zh);
  }
}

function makeCard(side, opt, colorClass, idx) {
  const sym = SYM[colorClass] || '';
  const wordTxt = LANG === 'zh' ? opt.zh : (opt.en || opt.zh);
  const subTxt  = LANG === 'zh' ? (opt.sub_zh || '') : (opt.sub_en || '');
  const d = document.createElement('div');
  d.className = `card ${colorClass} fade-in`;
  d.style.animationDelay = `${idx * 0.06}s`;
  d.dataset.side = side;
  d.innerHTML = `
    <div class="card-num">0${idx+1}</div>
    <div class="card-symbol">${sym}</div>
    <div class="card-content">
      <div class="card-word">${wordTxt}</div>
      ${subTxt ? `<div class="card-sub">${subTxt}</div>` : ''}
    </div>`;
  return d;
}

// ── SPLASH ──
function dismissSplash() {
  const sp = document.getElementById('splash');
  sp.classList.add('out');
  setTimeout(() => {
    sp.style.display = 'none';
    if (S.phase === 'naming') startNaming(); else startMain();
  }, 700);
}
setTimeout(() => {
  const sp = document.getElementById('splash');
  if (sp && !sp.classList.contains('out')) dismissSplash();
}, 3200);

// ── NAMING ──
function startNaming() {
  document.getElementById('naming-screen').classList.remove('hidden');
  document.getElementById('question-screen').classList.add('hidden');
  renderNamingQ();
}

function renderNamingQ() {
  const screen = document.getElementById('naming-screen');
  screen.innerHTML = '';
  if (S.namingIdx < NQ.length) {
    const q = NQ[S.namingIdx];
    screen.innerHTML = `
      <div class="naming-eyebrow">${LANG === 'zh' ? '選擇 想認識你' : 'choice wants to know you'}</div>
      <div class="naming-q">${LANG === 'zh' ? q.zh : q.en}</div>
      <div class="naming-cards" id="ncards"></div>`;
    const row = document.getElementById('ncards');
    ['a','b'].forEach((side, i) => {
      const card = makeCard(side, q[side], i===0?q.ca:q.cb, i);
      card.style.minHeight = '50vw';
      card.onclick = () => { S.namingAns.push(side); S.namingIdx++; save(); renderNamingQ(); };
      addSwipe(card, side === 'a' ? 'b' : 'a',
        () => { S.namingAns.push(side); S.namingIdx++; save(); renderNamingQ(); },
        () => { S.namingAns.push(side==='a'?'b':'a'); S.namingIdx++; save(); renderNamingQ(); });
      row.appendChild(card);
    });
  } else { revealName(); }
}

function revealName() {
  S.name = getName(S.namingAns); save();
  const screen = document.getElementById('naming-screen');
  screen.innerHTML = `
    <div class="reveal-wrap">
      <div class="reveal-line" id="rl1">${LANG==='zh'?'我想了一下。':'i thought about it.'}</div>
      <div class="reveal-name" id="rname">${S.name}</div>
      <div class="reveal-line" id="rl2">${LANG==='zh'?'可以這樣叫你嗎？':'can i call you this?'}</div>
      <div class="reveal-actions" id="ract">
        <button class="reveal-btn" onclick="rejectName()">${LANG==='zh'?'再想想':'try again'}</button>
        <button class="reveal-btn primary" onclick="acceptName()">${LANG==='zh'?'可以':'yes'}</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('rl1').classList.add('show'),300);
  setTimeout(()=>document.getElementById('rname').classList.add('show'),950);
  setTimeout(()=>document.getElementById('rl2').classList.add('show'),1550);
  setTimeout(()=>document.getElementById('ract').classList.add('show'),2100);
}

function acceptName() { S.phase='main'; save(); startMain(); }
function rejectName() {
  const keys = Object.values(NAMES).filter(n=>n!==S.name);
  S.name = rand(keys); save();
  const screen = document.getElementById('naming-screen');
  screen.innerHTML = `
    <div class="reveal-wrap">
      <div class="reveal-line" id="rl1">${LANG==='zh'?'好，再想想。':'okay, let me try again.'}</div>
      <div class="reveal-name" id="rname">${S.name}</div>
      <div class="reveal-line" id="rl2">${LANG==='zh'?'這個呢？':'how about this?'}</div>
      <div class="reveal-actions" id="ract">
        <button class="reveal-btn primary" onclick="acceptName()">${LANG==='zh'?'可以':'yes'}</button>
      </div>
    </div>`;
  setTimeout(()=>document.getElementById('rl1').classList.add('show'),200);
  setTimeout(()=>document.getElementById('rname').classList.add('show'),800);
  setTimeout(()=>document.getElementById('rl2').classList.add('show'),1400);
  setTimeout(()=>document.getElementById('ract').classList.add('show'),2000);
}

// ── MAIN ──
let curQ = null, picked = null;

function startMain() {
  document.getElementById('naming-screen').classList.add('hidden');
  document.getElementById('question-screen').classList.remove('hidden');
  document.getElementById('lang-btn').classList.add('visible');
  document.getElementById('counter').classList.add('visible');
  if (!S.pool.length) shufflePool();
  renderChips(); updateCounter(); loadQ();
}

function loadQ() {
  const h = new Date().getHours();
  curQ = null;

  // 時段感知題（偶爾）
  if (S.answered > 3 && Math.random() < 0.1) {
    if (h>=12&&h<=13) curQ=TQ_NOON;
    else if (h>=23||h<=4) curQ=TQ_NIGHT;
    else if (h>=6&&h<=8) curQ=TQ_MORN;
  }

  if (!curQ) curQ = getNextQ();

  picked = null;

  let label = getLabel();
  if (S.name && S.answered > 5 && Math.random() < 0.18) {
    label = LANG==='zh'
      ? rand([`${S.name}，`,'嘿，','又是你，'])
      : rand([`${S.name},`,'hey,','there you are,']);
  }

  document.getElementById('q-eyebrow').textContent = label;
  document.getElementById('q-text').textContent = LANG==='zh' ? curQ.zh : (curQ.en||curQ.zh);
  document.getElementById('skip-btn').textContent = getSkip(curQ.t);
  document.getElementById('skip-btn').style.opacity = '';
  document.getElementById('skip-btn').style.pointerEvents = '';
  document.getElementById('swipe-hint').textContent = LANG==='zh' ? '← 左滑或右滑，或直接點選 →' : '← swipe or tap →';
  updateCounter();
  renderCards();
}

function renderCards() {
  const area = document.getElementById('cards-area');
  area.innerHTML = '';
  ['a','b'].forEach((side, i) => {
    const card = makeCard(side, curQ[side], i===0?curQ.ca:curQ.cb, i);
    card.onclick = () => choose(side);
    addSwipe(card,
      side,
      () => choose('a'),
      () => choose('b')
    );
    area.appendChild(card);
  });
}

function choose(side) {
  if (picked) return;
  picked = side;
  const opt = curQ[side];
  const chipTxt = LANG==='zh' ? opt.zh : (opt.en||opt.zh);

  document.querySelectorAll('.card').forEach(c => {
    if (c.dataset.side === side) c.classList.add('chosen');
    else c.classList.add('unchosen');
  });

  addChip(chipTxt);
  S.choices.push({ q:curQ.zh, a:opt.zh, tag:curQ.t, ts:Date.now() });
  S.answered++;
  if (!curQ.fromAI) S.poolIdx++;
  save(); updateCounter();

  document.getElementById('skip-btn').style.opacity = '0';
  document.getElementById('skip-btn').style.pointerEvents = 'none';
  document.getElementById('swipe-hint').textContent = '';

  setTimeout(() => nextQuestion(), 820);
}

function nextQuestion() {
  const area = document.getElementById('cards-area');
  area.classList.add('fade-out');
  setTimeout(() => { area.classList.remove('fade-out'); loadQ(); }, 260);
}

function skipQuestion() {
  S.skipped++; S.poolIdx++; save(); nextQuestion();
}

// ── AI INFINITE QUESTION GENERATION ──
let aiQueue = [];
let aiGenerating = false;

const ALL_COLORS = ['c-night','c-chalk','c-ink','c-sand','c-void','c-moss','c-ash','c-ember','c-fog','c-dawn','c-sun','c-rose','c-sky','c-mint','c-peach','c-lilac','c-cream','c-coral','c-teal','c-gold'];

function colorPair() {
  const shuffled = [...ALL_COLORS].sort(() => Math.random() - 0.5);
  return [shuffled[0], shuffled[1]];
}

async function generateAIQuestions() {
  if (aiGenerating || aiQueue.length > 3) return;
  aiGenerating = true;

  const recentChoices = S.choices.slice(-10).map(c => `「${c.q}」→ 選了「${c.a}」`).join('、');
  const recentAnswers = S.choices.slice(-5).map(c => c.a).join('、');

  const prompt = `你是一個叫「選擇」的 app，專門問用戶有趣的二選一問題。

用戶最近的選擇紀錄：${recentChoices || '還沒有紀錄'}

請根據這個用戶的個性傾向，生成 5 道全新的二選一問題。

規則：
- 問題要生活化、口語化、有趣，像朋友之間的聊天
- 可以是搞笑的、戳心的、荒謬的、感性的、日常的——混合各種風格
- 每道題都是「你比較像哪個？」或類似的口語問法
- 兩個選項都要能讓任何人回答（不預設特定生活方式）
- 選項要簡短有力，最多 8 個中文字
- 絕對不能重複這些已問過的題目或選項：${recentAnswers}

請只回傳 JSON，格式如下，不要加其他文字：
[
  {
    "zh": "問題中文",
    "en": "question in english",
    "a": {"zh": "選項A中文", "en": "option A english", "sub_zh": "", "sub_en": ""},
    "b": {"zh": "選項B中文", "en": "option B english", "sub_zh": "", "sub_en": ""},
    "t": "fun"
  }
]

t 的值只能是 "fun"、"deep"、"normal" 其中一個。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const questions = JSON.parse(clean);

    questions.forEach(q => {
      const [ca, cb] = colorPair();
      aiQueue.push({ ...q, ca, cb, fromAI: true });
    });

  } catch (e) {
    console.log('AI generation failed, using local pool', e);
  }

  aiGenerating = false;
}

function getNextQ() {
  // 每答 3 題就嘗試預先生成 AI 題目
  if (S.answered % 3 === 0) generateAIQuestions();

  // 優先用 AI 生成的題目（混入本地題庫中）
  if (aiQueue.length > 0 && Math.random() < 0.6) {
    return aiQueue.shift();
  }

  // fallback：本地題庫循環
  if (S.poolIdx >= S.pool.length) shufflePool();
  return S.pool[S.poolIdx];
}

// ── SWIPE GESTURE ──
function addSwipe(el, side, onLeft, onRight) {
  let startX = 0, startY = 0, moved = false;
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) moved = true;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!moved) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) < 40) return;
    if (picked) return;
    if (dx < 0) onLeft();
    else onRight();
  });
}
</script>
